<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Trader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#0f172a', card: '#1e293b', hover: '#334155' },
            accent: { green: '#22c55e', red: '#ef4444', blue: '#3b82f6', yellow: '#eab308' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f172a; }
    .card { @apply bg-surface-card rounded-xl border border-slate-700/50 p-5 shadow-lg; }
    .btn { @apply px-4 py-2 rounded-lg font-medium text-sm transition-all duration-150 disabled:opacity-50; }
    .btn-primary { @apply btn bg-blue-600 hover:bg-blue-500 text-white; }
    .btn-success { @apply btn bg-emerald-600 hover:bg-emerald-500 text-white; }
    .btn-warning { @apply btn bg-amber-600 hover:bg-amber-500 text-white; }
    .stat-value { @apply text-2xl font-bold text-white; }
    .stat-label { @apply text-xs text-slate-400 uppercase tracking-wider; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request .htmx-hide-on-request { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; display: inline-block; }
  </style>
</head>
<body class="text-slate-200 min-h-screen">
  <nav class="border-b border-slate-700/50 bg-surface-card/80 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-xl">📊</span>
        <h1 class="text-lg font-bold text-white">Paper Trader</h1>
        <span class="text-xs bg-blue-600/20 text-blue-400 px-2 py-0.5 rounded-full border border-blue-600/30">beta</span>
      </div>
      <div class="text-sm text-slate-400">Elo + Polymarket Edge Detection</div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-700/50 mt-12">
    <div class="max-w-7xl mx-auto px-6 py-4 text-center text-xs text-slate-500">
      Paper trading only — no real money at risk. Powered by Elo ratings.
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
